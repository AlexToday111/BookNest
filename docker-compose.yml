services:
  app:
    build: .
    depends_on:
      postgres:
        condition: service_healthy
      mongodb:
        condition: service_started
    environment:
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE:-local}
      POSTGRES_DB: ${POSTGRES_DB:-booknest}
      POSTGRES_USER: ${POSTGRES_USER:-booknest}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-booknest}
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_INITDB_ROOT_USERNAME:-booknest}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_INITDB_ROOT_PASSWORD:-booknest}
      MONGO_DATABASE: ${MONGO_DATABASE:-booknest}
    ports:
      - "8080:8080"

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-booknest}
      POSTGRES_USER: ${POSTGRES_USER:-booknest}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-booknest}
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 3s
      retries: 10

  mongodb:
    image: mongo:7
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_INITDB_ROOT_USERNAME:-booknest}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_INITDB_ROOT_PASSWORD:-booknest}
      MONGO_INITDB_DATABASE: ${MONGO_DATABASE:-booknest}
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db

  mongo-express:
    image: mongo-express:1.0.2
    profiles: ["tools"]
    depends_on:
      - mongodb
    environment:
      ME_CONFIG_MONGODB_ADMINUSERNAME: ${MONGO_INITDB_ROOT_USERNAME:-booknest}
      ME_CONFIG_MONGODB_ADMINPASSWORD: ${MONGO_INITDB_ROOT_PASSWORD:-booknest}
      ME_CONFIG_MONGODB_URL: mongodb://${MONGO_INITDB_ROOT_USERNAME:-booknest}:${MONGO_INITDB_ROOT_PASSWORD:-booknest}@mongodb:27017/
      ME_CONFIG_BASICAUTH: "false"
    ports:
      - "8081:8081"

  pgadmin:
    image: dpage/pgadmin4:8
    profiles: ["tools"]
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@booknest.local
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - "5050:80"

volumes:
  postgres-data:
  mongo-data:
